<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XLRS 15 Calculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  max-width: 420px;
  margin: auto;
}
select, input {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  font-size: 16px;
}
.result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<h3>XLRS 15 Calculator</h3>

<!-- Fixed item -->
<select disabled>
  <option>XLRS 15</option>
</select>

<select id="orientation">
  <option value="">Select orientation</option>
  <option value="15">Horizontal</option>
  <option value="20">Vertical</option>
</select>

<input type="number" id="v1" placeholder="Value 1">
<input type="number" id="v2" placeholder="Value 2">

<div class="result" id="out">Enter values to calculate</div>

<script>
const orientationEl = document.getElementById("orientation");
const v1El = document.getElementById("v1");
const v2El = document.getElementById("v2");
const outEl = document.getElementById("out");

function calculate() {
  const factor = Number(orientationEl.value);
  const v1 = Number(v1El.value);
  const v2 = Number(v2El.value);

  if (!factor || isNaN(v1) || isNaN(v2)) {
    outEl.innerText = "Enter all values to calculate";
    return;
  }

  const result = v1 * v2 * factor;
  outEl.innerText = "Result: " + result.toFixed(2);
}

// Auto-calc on every change
orientationEl.addEventListener("change", calculate);
v1El.addEventListener("input", calculate);
v2El.addEventListener("input", calculate);
</script>

</body>
</html>
