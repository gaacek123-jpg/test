<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GuideRailCalculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 10px;
  max-width: 420px;
  margin: auto;
  background-color: #2C2C2C;
  color: #E0E0E0;
}

h3 {
  text-align: center;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: #3A3A3A;
  color: white;
  border: 1px solid #444;
  border-radius: 4px;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #3A3A3A;
  border-left: 4px solid #4CAF50;
}
</style>
</head>

<body>

<h3>GuideRailCalculator</h3>

<label>Banda:</label>
<select>
  <option>XLRS 15</option>
</select>

<label>Orientacja gięcia:</label>
<select>
  <option>Horizontal</option>
  <option>Vertical</option>
</select>

<label>Promień:</label>
<input type="number" id="r" oninput="calc()">

<label>Długość łuku:</label>
<input type="number" id="L" oninput="calc()">

<div class="result" id="out">Wynik pojawi się tutaj...</div>

<script>
function calc() {
  const r = parseFloat(document.getElementById("r").value);
  const L = parseFloat(document.getElementById("L").value);

  if (isNaN(r) || isNaN(L) || r === 0) {
    document.getElementById("out").innerHTML = "⚠️ Wprowadź poprawne wartości";
    return;
  }

  // Kąt (stopnie)
  const angle = (L / r) * (180 / Math.PI);

  // Długość gięcia
  const B4 = (L * r) / (r + 15);

  // Wynik końcowy (już uproszczony matematycznie)
  const result = 3996 * (L / r) / B4;

  document.getElementById("out").innerHTML = `
    ✅ <strong>Wynik:</strong> ${result.toFixed(2)}<br><br>
    <strong>Kąt łuku:</strong> ${angle.toFixed(2)}°<br>
    <strong>Długość gięcia:</strong> ${B4.toFixed(2)}
  `;
}
</script>

</body>
</html>
