<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GuideRailCalculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  max-width: 420px;
  margin: auto;
}
select, input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  font-size: 16px;
}
.result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<h3>GuideRailCalculator</h3>

<select id="item">
  <option value="A">Item A</option>
  <option value="B">Item B</option>
  <option value="C">Item C</option>
</select>

<select id="orientation">
  <option value="horizontal">Horizontal</option>
  <option value="vertical">Vertical</option>
</select>

<input type="number" id="v1" placeholder="Value 1">
<input type="number" id="v2" placeholder="Value 2">

<button onclick="calc()">Calculate</button>

<div class="result" id="out"></div>

<script>
function getConstant(item, orientation) {
  // Mapa stałych dla każdej kombinacji
  const constants = {
    'A-horizontal': 2.5,
    'A-vertical': 3.0,
    'B-horizontal': 1.8,
    'B-vertical': 2.2,
    'C-horizontal': 4.0,
    'C-vertical': 5.5
  };
  
  const key = `${item}-${orientation}`;
  return constants[key] || 1; // domyślnie 1 jeśli nie znaleziono
}

function calc() {
  const item = document.getElementById("item").value;
  const orientation = document.getElementById("orientation").value;
  const v1 = Number(document.getElementById("v1").value);
  const v2 = Number(document.getElementById("v2").value);

  if (!v1 || !v2) {
    document.getElementById("out").innerText = "Please enter both values";
    return;
  }

  const constant = getConstant(item, orientation);
  const result = v1 * v2 * constant;
  document.getElementById("out").innerText = "Result: " + result.toFixed(2);
}
</script>

</body>
</html>
