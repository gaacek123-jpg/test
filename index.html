<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GuideRailCalculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 10px;
  max-width: 420px;
  margin: auto;
  background-color: #2C2C2C; /* Deep graphite background */
  color: #E0E0E0; /* Light text for contrast */
}

h3 {
  color: #FFFFFF;
  text-align: center;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  font-weight: bold;
  color: #B0B0B0;
}

select, input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-top: 5px;
  box-sizing: border-box;
  border: 1px solid #444;
  border-radius: 4px;
  background-color: #3A3A3A;
  color: #FFFFFF;
}

select:focus, input:focus {
  outline: none;
  border-color: #4CAF50;
  box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
}

select option {
  background-color: #3A3A3A;
  color: #FFFFFF;
}

input::placeholder {
  color: #888;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background-color: #3A3A3A;
  border-left: 4px solid #4CAF50;
  font-size: 18px;
  font-weight: bold;
  border-radius: 4px;
  min-height: 25px;
  color: #FFFFFF;
}

.result small {
  color: #B0B0B0 !important;
}
</style>
</head>

<body>

<h3>GuideRailCalculator</h3>

<label for="item">Banda:</label>
<select id="item">
  <option value="XLRS_15">XLRS 15</option>
  <option value="B">Item B</option>
  <option value="C">Item C</option>
</select>

<label for="orientation">Orientacja gięcia:</label>
<select id="orientation">
  <option value="horizontal">Horizontal</option>
  <option value="vertical">Vertical</option>
</select>

<label for="v1">Promień:</label>
<input type="number" id="v1" placeholder="Wprowadź promień" oninput="calc()">

<label for="v2">Długość łuku:</label>
<input type="number" id="v2" placeholder="Wprowadź długość łuku" oninput="calc()">

<div class="result" id="out">Wynik pojawi się tutaj...</div>

<script>
// Automatyczne przeliczanie przy zmianie selectów
document.getElementById("item").addEventListener("change", calc);
document.getElementById("orientation").addEventListener("change", calc);

function getConstant(item, orientation) {
  // Mapa stałych dla każdej kombinacji
  const constants = {
    'XLRS_15-horizontal': 2.5,
    'XLRS_15-vertical': 3.0,
    'B-horizontal': 1.8,
    'B-vertical': 2.2,
    'C-horizontal': 4.0,
    'C-vertical': 5.5
  };
  
  const key = `${item}-${orientation}`;
  return constants[key] || 1; // domyślnie 1 jeśli nie znaleziono
}

function calc() {
  const item = document.getElementById("item").value;
  const orientation = document.getElementById("orientation").value;
  const v1 = parseFloat(document.getElementById("v1").value);
  const v2 = parseFloat(document.getElementById("v2").value);

  // Sprawdź czy obie wartości są wprowadzone i są liczbami
  if (isNaN(v1) || isNaN(v2) || document.getElementById("v1").value === "" || document.getElementById("v2").value === "") {
    document.getElementById("out").innerHTML = "⚠️ Wprowadź obie wartości";
    return;
  }

  const constant = getConstant(item, orientation);
  const result = v1 * v2 * constant;
  
  document.getElementById("out").innerHTML = `
    ✅ <strong>Wynik:</strong> ${result.toFixed(2)}<br>
    <small>
      (${v1} × ${v2} × ${constant} = ${result.toFixed(2)})
    </small>
  `;
}

// Inicjalne wywołanie przy załadowaniu strony
window.addEventListener("DOMContentLoaded", function() {
  document.getElementById("out").innerHTML = "Wynik pojawi się tutaj...";
});
</script>

</body>
</html>
